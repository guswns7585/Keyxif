name: Release APK

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret is missing." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keyxif-release.jks"

      - name: Build signed release APK
        env:
          CI: "true"
          KEYSTORE_FILE: ${{ runner.temp }}/keyxif-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -n 1)
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_NAME="keyxif-${VERSION_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Keyxif ${{ steps.version.outputs.version_name }}
          body_path: docs/release-template.md
          files: ${{ steps.version.outputs.apk_name }}

      - name: Generate update.json
        shell: bash
        run: |
          OWNER_REPO="${GITHUB_REPOSITORY}"
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          TAG_NAME="${{ steps.version.outputs.tag_name }}"
          APK_NAME="${{ steps.version.outputs.apk_name }}"
          mkdir -p docs
          cat > docs/update.json <<EOF
          {
            "latestVersionCode": ${VERSION_CODE},
            "latestVersionName": "${VERSION_NAME}",
            "minRequiredVersionCode": 1,
            "title": "새 버전이 있습니다",
            "message": "GitHub Releases에서 새 Keyxif APK를 받을 수 있습니다.",
            "apkUrl": "https://github.com/${OWNER_REPO}/releases/download/${TAG_NAME}/${APK_NAME}",
            "releaseNoteUrl": "https://github.com/${OWNER_REPO}/releases/tag/${TAG_NAME}",
            "forceUpdate": false
          }
          EOF

      - name: Commit update.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/update.json
          if git diff --cached --quiet; then
            echo "docs/update.json is already up to date."
          else
            git commit -m "Update release metadata for ${{ steps.version.outputs.tag_name }}"
            git push origin HEAD:main
          fi
